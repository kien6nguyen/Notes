services:
  # ── Backend API (Laravel) ──────────────────────────────────────
  - type: web
    name: notes-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: NotesApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false                   # Run: php artisan key:generate --show
      - key: APP_URL
        sync: false                   # Fill in: https://notes-backend.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: notes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notes-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: notes-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: notes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notes-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: redis
          name: notes-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: notes-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: notes-redis
          property: password
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: notesapp
      - key: REVERB_APP_KEY
        value: notesappkey
      - key: REVERB_APP_SECRET
        sync: false                   # Set any secret string
      - key: REVERB_HOST
        value: "0.0.0.0"
      - key: REVERB_PORT
        value: "8085"
      - key: REVERB_SCHEME
        value: http
      - key: FRONTEND_URL
        sync: false                   # Fill in: https://notes-frontend.onrender.com
      - key: MAIL_MAILER
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_LEVEL
        value: error

  # ── Frontend (React Static Site) ───────────────────────────────
  # Deploy as Render Static Site (not listed here — configure in dashboard)
  # Build Command: npm run build
  # Publish Directory: dist
  # Root Directory: frontend
  # Env: VITE_API_URL = https://notes-backend.onrender.com/api

  # ── Redis ───────────────────────────────────────────────────────
  - type: redis
    name: notes-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────
  - name: notes-db
    plan: free
    databaseName: notesdb
    user: notesuser
