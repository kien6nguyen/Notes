services:
  # ── Backend API (Laravel) ──────────────────────────────────────
  - type: web
    name: notes-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Notes App
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false                   # Fill in with your generated base64 key
      - key: FRONTEND_URL
        sync: false                   # Fill in: https://your-frontend.onrender.com

      # Database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: notes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notes-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: notes-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: notes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notes-db
          property: password
      - key: DB_SSLMODE
        value: require

      # Upstash Redis
      - key: REDIS_SCHEME
        value: tls
      - key: REDIS_HOST
        sync: false                   # Fill in your Upstash Host
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false                   # Fill in your Upstash Password
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis

      # WebSockets (Reverb)
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: finalweb
      - key: REVERB_APP_KEY
        value: finalwebkey
      - key: REVERB_APP_SECRET
        value: finalwebsecret
      - key: REVERB_HOST
        sync: false                   # Fill in: notes-backend.onrender.com
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https

      # Queue & Mail
      - key: QUEUE_CONNECTION
        value: redis
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_SCHEME
        value: smtps
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "Notes App"

databases:
  # ── PostgreSQL (Render free) ────────────────────────────────────
  - name: notes-db
    plan: free
    databaseName: finalweb_db
    user: finalweb_user
